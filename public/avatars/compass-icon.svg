<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Rounded square white background -->
  <rect x="10" y="10" width="180" height="180" rx="26" ry="26" fill="#FFFFFF" stroke="#e5e5e5" stroke-width="1"/>

  <g transform="translate(100, 100)">

    <!-- 4 short cardinal direction ticks -->
    <line x1="0" y1="-68" x2="0" y2="-59" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="0" y1="59" x2="0" y2="68" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="-68" y1="0" x2="-59" y2="0" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="59" y1="0" x2="68" y2="0" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/>

    <!-- Paper airplane compass needle rotated ~42° to upper-right -->
    <g transform="rotate(42)">

      <!-- Left wing fold -->
      <path d="M 0 -14 L -22.5 -2 L 0 16"
            fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linejoin="round"/>

      <!-- Right wing fold -->
      <path d="M 0 -14 L 22.5 -2 L 0 16"
            fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linejoin="round"/>

      <!-- Upper spine (above diamond) -->
      <line x1="0" y1="-44" x2="0" y2="-10" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>

      <!-- Lower spine (below diamond) -->
      <line x1="0" y1="10" x2="0" y2="40" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>

      <!-- Hollow diamond center (the fold/pivot) -->
      <polygon points="0,-10 -6.5,0 0,10 6.5,0"
               fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.8" stroke-linejoin="round"/>

    </g>

    <!-- Green identity dot - bottom right -->
    <circle cx="42" cy="48" r="4" fill="#22C55E"/>

  </g>
</svg>
